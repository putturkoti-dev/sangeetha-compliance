{% extends 'base.html' %}
{% load custom_tags %}
{% block content %}

<div class="container-fluid">

<style>
.page-card{
background:#fff;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
padding:25px;
max-width:950px;
margin:auto;
}
</style>

<div class="page-card">

<h2 class="fw-bold mb-2">Edit Employee</h2>
<p class="text-muted mb-4">Update employee information</p>

<form method="POST">
{% csrf_token %}

<div class="row">

{% for col in columns %}
<div class="col-md-6 mb-3">

<label class="fw-semibold mb-1">{{ col }}</label>

<input class="form-control"
name="{{ col }}"
value="{{ obj.dynamic_data|get_item:col }}">

</div>
{% endfor %}

</div>

<div class="mt-3 d-flex gap-2">

<button class="btn btn-success">
Update Employee
</button>

<a href="/employees/?month={{ obj.month }}&year={{ obj.year }}"
class="btn btn-secondary">
Back
</a>

</div>

</form>

</div>

</div>

{% endblock %}
