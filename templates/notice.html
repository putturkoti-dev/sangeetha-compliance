{% extends 'base.html' %}

{% block content %}

<div class="container-fluid" style="max-width: 1100px; margin-top: 10px;">

    <!-- PAGE TITLE -->
    <h3 class="mb-1">Notice Builder</h3>
    <p class="text-muted mb-3">Create and manage notices easily</p>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('form')">Form Builder</button>
        <button class="tab-btn" onclick="openTab('import')">Import Data</button>
        <button class="tab-btn" onclick="openTab('view')">View Data</button>
    </div>

    <!-- ================= FORM TAB ================= -->
    <div id="form" class="tab-content active">
        <div class="section-box notice-box">

            <h5 class="mb-3 fw-semibold text-primary">📢 Create Notice</h5>

            <div class="form-group">
                <label>Notice Title</label>
                <input type="text" class="form-control custom-input" placeholder="Enter title">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control custom-input" rows="4" placeholder="Enter notice"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group" style="width: 250px;">
                    <label>Date</label>
                    <input type="date" class="form-control custom-input">
                </div>
            </div>

            <button class="btn custom-btn w-100">Publish Notice</button>

        </div>
    </div>

    <!-- ================= IMPORT TAB ================= -->
    <div id="import" class="tab-content">
        <div class="section-box notice-box">

            <h5 class="mb-3">📥 Import from Excel / CSV</h5>

            <div class="form-group">
                <label>Select Table</label>
                <select class="form-control custom-input">
                    <option>Choose a table...</option>
                </select>
            </div>

            <p class="text-muted small">
                No tables found. Create a table first in Form Builder.
            </p>

        </div>
    </div>

    <!-- ================= VIEW TAB ================= -->
    <div id="view" class="tab-content">
        <div class="section-box notice-box text-center">

            <h5 class="mb-3">📊 View Data</h5>
            <p class="text-muted">No data available</p>

        </div>
    </div>

</div>

{% endblock %}
